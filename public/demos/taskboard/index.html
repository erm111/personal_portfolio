<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlowBoard — Task Management Prototype</title>
<style>
  :root{
    --bg:#f6f7f9;--panel:#ffffff;--col:#eef0f4;--line:#e3e6eb;
    --text:#1b1f27;--muted:#6b7280;--accent:#6366f1;--accent2:#8b5cf6;
    --p-high:#e11d48;--p-med:#d97706;--p-low:#16a34a;--radius:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:
    radial-gradient(900px 500px at 90% -10%,rgba(99,102,241,.07),transparent),var(--bg);
    color:var(--text);min-height:100vh}
  header{border-bottom:1px solid var(--line);background:rgba(255,255,255,.82);backdrop-filter:blur(10px);
    position:sticky;top:0;z-index:20}
  .bar{max-width:1300px;margin:0 auto;padding:14px 22px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px}
  .logo b{background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .back{color:var(--muted);text-decoration:none;font-size:13px}
  .back:hover{color:var(--text)}
  .live{margin-left:auto;display:inline-flex;gap:7px;align-items:center;color:var(--muted);font-size:12px;
    background:var(--panel);border:1px solid var(--line);padding:7px 13px;border-radius:20px}
  .dot{width:8px;height:8px;border-radius:50%;background:#22c55e;animation:p 1.4s infinite}
  @keyframes p{50%{opacity:.3}}
  .newbtn{background:linear-gradient(90deg,var(--accent),var(--accent2));border:none;color:#fff;
    font-weight:700;padding:10px 16px;border-radius:9px;cursor:pointer;font-size:14px;box-shadow:0 2px 8px rgba(99,102,241,.3)}
  .stats{max-width:1300px;margin:20px auto 0;padding:0 22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .stat .n{font-size:26px;font-weight:800}
  .stat .l{color:var(--muted);font-size:12px;margin-top:2px}
  .prog{height:6px;background:var(--col);border-radius:6px;margin-top:10px;overflow:hidden}
  .prog i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
  .board{max-width:1300px;margin:20px auto;padding:0 22px 30px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .column{background:var(--col);border:1px solid var(--line);border-radius:var(--radius);padding:12px;min-height:420px;transition:.15s}
  .column.drag{border-color:var(--accent);background:rgba(99,102,241,.07)}
  .chead{display:flex;align-items:center;gap:8px;padding:6px 6px 12px;font-weight:700}
  .cdotc{width:10px;height:10px;border-radius:3px}
  .count{margin-left:auto;background:var(--panel);border:1px solid var(--line);color:var(--muted);
    font-size:12px;padding:2px 9px;border-radius:20px;font-weight:700}
  .task{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px;
    cursor:grab;transition:.15s}
  .task:hover{border-color:var(--accent);transform:translateY(-2px)}
  .task.dragging{opacity:.4}
  .ttop{display:flex;justify-content:space-between;align-items:start;gap:8px}
  .prio{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px;text-transform:uppercase;letter-spacing:.5px}
  .tdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;opacity:0}
  .task:hover .tdel{opacity:1}
  .tdel:hover{color:var(--p-high)}
  .ttitle{font-weight:600;font-size:14px;margin:8px 0 6px;line-height:1.35}
  .tmeta{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
  .ava{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:800;color:#06121f}
  .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
  .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;background:var(--col);color:var(--muted);border:1px solid var(--line)}
  /* modal */
  .ov{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center;z-index:40;padding:20px}
  .ov.open{display:grid}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:18px;width:440px;max-width:100%;padding:24px}
  .modal h3{margin-bottom:16px}
  label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin:12px 0 6px;text-transform:uppercase;letter-spacing:.5px}
  input,select,textarea{width:100%;background:var(--col);border:1px solid var(--line);color:var(--text);
    padding:11px 13px;border-radius:10px;font-size:14px;outline:none;font-family:inherit}
  input:focus,select:focus,textarea:focus{border-color:var(--accent)}
  .mrow{display:flex;gap:12px}.mrow>div{flex:1}
  .mbtns{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:12px;border-radius:11px;font-weight:800;cursor:pointer;border:1px solid var(--line);font-size:14px}
  .btn.ghost{background:var(--col);color:var(--text)}
  .btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));color:#fff;border:none}
  .feed{position:fixed;bottom:16px;left:16px;font-size:12px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);padding:9px 14px;border-radius:10px;max-width:320px;opacity:0;transform:translateY(10px);transition:.3s}
  .feed.show{opacity:1;transform:none}
  @media(max-width:900px){.board,.stats{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.board,.stats{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">🗂️ <span>Flow<b>Board</b></span></div>
    <a class="back" href="/#projects">← Portfolio</a>
    <span class="live"><span class="dot"></span> Realtime · 4 collaborators online</span>
    <button class="newbtn" onclick="openModal()">+ New Task</button>
  </div>
</header>

<div class="stats" id="stats"></div>
<div class="board" id="board"></div>

<div class="ov" id="ov">
  <div class="modal">
    <h3 id="mtitle">New Task</h3>
    <label>Title</label>
    <input id="f_title" placeholder="e.g. Design the checkout flow" />
    <div class="mrow">
      <div><label>Priority</label>
        <select id="f_prio"><option value="high">High</option><option value="med" selected>Medium</option><option value="low">Low</option></select>
      </div>
      <div><label>Assignee</label>
        <select id="f_who"><option>EM</option><option>JD</option><option>AK</option><option>SL</option></select>
      </div>
    </div>
    <div class="mrow">
      <div><label>Status</label>
        <select id="f_status"><option value="backlog">Backlog</option><option value="todo">To Do</option><option value="doing">In Progress</option><option value="done">Done</option></select>
      </div>
      <div><label>Tag</label>
        <select id="f_tag"><option>frontend</option><option>backend</option><option>design</option><option>bug</option><option>research</option></select>
      </div>
    </div>
    <div class="mbtns">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveTask()">Save Task</button>
    </div>
  </div>
</div>

<div class="feed" id="feed"></div>

<script>
const COLS=[
  {key:'backlog',name:'Backlog',color:'#8896ab'},
  {key:'todo',name:'To Do',color:'#38bdf8'},
  {key:'doing',name:'In Progress',color:'#f59e0b'},
  {key:'done',name:'Done',color:'#22c55e'},
];
const PRIO={high:{l:'High',c:'#f43f5e'},med:{l:'Medium',c:'#f59e0b'},low:{l:'Low',c:'#22c55e'}};
const AVA={EM:'#38bdf8',JD:'#818cf8',AK:'#f472b6',SL:'#34d399'};
const SEED=[
  {id:1,title:'Set up JWT authentication & refresh tokens',prio:'high',who:'EM',status:'doing',tag:'backend'},
  {id:2,title:'Build responsive Kanban board UI',prio:'high',who:'JD',status:'done',tag:'frontend'},
  {id:3,title:'Design onboarding illustration set',prio:'med',who:'AK',status:'todo',tag:'design'},
  {id:4,title:'Fix WebSocket reconnection drop on idle',prio:'high',who:'SL',status:'doing',tag:'bug'},
  {id:5,title:'Research drag-and-drop libraries',prio:'low',who:'EM',status:'done',tag:'research'},
  {id:6,title:'Add email notifications for mentions',prio:'med',who:'JD',status:'todo',tag:'backend'},
  {id:7,title:'Draft Q3 product roadmap',prio:'low',who:'AK',status:'backlog',tag:'research'},
  {id:8,title:'Dark mode color audit',prio:'low',who:'SL',status:'backlog',tag:'design'},
  {id:9,title:'Optimise board render for 500+ cards',prio:'med',who:'EM',status:'todo',tag:'frontend'},
];
let tasks=[], editId=null, dragId=null;

function load(){try{tasks=JSON.parse(localStorage.getItem('flowboard'))||SEED}catch(e){tasks=SEED}}
function save(){localStorage.setItem('flowboard',JSON.stringify(tasks))}

function renderStats(){
  const total=tasks.length, done=tasks.filter(t=>t.status==='done').length;
  const doing=tasks.filter(t=>t.status==='doing').length;
  const high=tasks.filter(t=>t.prio==='high'&&t.status!=='done').length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('stats').innerHTML=`
    ${statCard(total,'Total Tasks','')}
    ${statCard(doing,'In Progress','')}
    ${statCard(high,'High Priority Open','')}
    <div class="stat"><div class="n">${pct}%</div><div class="l">Completed</div><div class="prog"><i style="width:${pct}%"></i></div></div>`;
}
function statCard(n,l){return `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`}

function renderBoard(){
  document.getElementById('board').innerHTML=COLS.map(c=>{
    const list=tasks.filter(t=>t.status===c.key);
    return `<div class="column" data-col="${c.key}"
        ondragover="allow(event,this)" ondragleave="this.classList.remove('drag')" ondrop="drop(event,'${c.key}',this)">
      <div class="chead"><span class="cdotc" style="background:${c.color}"></span>${c.name}<span class="count">${list.length}</span></div>
      ${list.map(cardHTML).join('')||'<div style="color:var(--muted);font-size:12px;text-align:center;padding:24px 0">Drop tasks here</div>'}
    </div>`;
  }).join('');
}
function cardHTML(t){
  const p=PRIO[t.prio];
  return `<div class="task" draggable="true" ondragstart="dragStart(event,${t.id})" ondragend="dragEnd(event)">
    <div class="ttop">
      <span class="prio" style="background:${p.c}22;color:${p.c}">${p.l}</span>
      <button class="tdel" onclick="del(${t.id})" title="Delete">🗑</button>
    </div>
    <div class="tags"><span class="tag">#${t.tag}</span></div>
    <div class="ttitle">${t.title}</div>
    <div class="tmeta"><span class="ava" style="background:${AVA[t.who]}">${t.who}</span>
      <span>#${String(t.id).padStart(3,'0')}</span></div>
  </div>`;
}

function dragStart(e,id){dragId=id;e.target.classList.add('dragging');e.dataTransfer.effectAllowed='move'}
function dragEnd(e){e.target.classList.remove('dragging')}
function allow(e,col){e.preventDefault();col.classList.add('drag')}
function drop(e,status,col){
  e.preventDefault();col.classList.remove('drag');
  const t=tasks.find(x=>x.id===dragId);
  if(t&&t.status!==status){
    const old=COLS.find(c=>c.key===t.status).name;
    t.status=status;save();renderBoard();renderStats();
    feed(`${t.who} moved “${t.title.slice(0,26)}…” to ${COLS.find(c=>c.key===status).name}`);
  }
  dragId=null;
}

function openModal(id){
  editId=id||null;
  document.getElementById('mtitle').textContent=id?'Edit Task':'New Task';
  const t=id?tasks.find(x=>x.id===id):{title:'',prio:'med',who:'EM',status:'todo',tag:'frontend'};
  f_title.value=t.title;f_prio.value=t.prio;f_who.value=t.who;f_status.value=t.status;f_tag.value=t.tag;
  document.getElementById('ov').classList.add('open');f_title.focus();
}
function closeModal(){document.getElementById('ov').classList.remove('open')}
function saveTask(){
  const title=f_title.value.trim();if(!title){f_title.focus();return}
  if(editId){Object.assign(tasks.find(x=>x.id===editId),{title,prio:f_prio.value,who:f_who.value,status:f_status.value,tag:f_tag.value})}
  else{tasks.push({id:Date.now()%100000,title,prio:f_prio.value,who:f_who.value,status:f_status.value,tag:f_tag.value});feed(`New task created: “${title.slice(0,30)}”`)}
  save();renderBoard();renderStats();closeModal();
}
function del(id){tasks=tasks.filter(t=>t.id!==id);save();renderBoard();renderStats()}

let feedTimer;
function feed(msg){const f=document.getElementById('feed');f.textContent='⚡ '+msg;f.classList.add('show');clearTimeout(feedTimer);feedTimer=setTimeout(()=>f.classList.remove('show'),3000)}

// Simulate a teammate moving a task occasionally
const NAMES=['Ada','Jordan','Kai','Sam'];
setInterval(()=>{
  if(!tasks.length)return;
  const movable=tasks.filter(t=>t.status!=='done');
  if(!movable.length)return;
  const t=movable[Math.floor(Math.random()*movable.length)];
  const order=['backlog','todo','doing','done'];
  const next=order[Math.min(order.length-1,order.indexOf(t.status)+1)];
  if(next!==t.status){t.status=next;save();renderBoard();renderStats();
    feed(`${NAMES[Math.floor(Math.random()*4)]} advanced “${t.title.slice(0,24)}…”`)}
},9000);

document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')closeModal()});
load();renderStats();renderBoard();
</script>
</body>
</html>
