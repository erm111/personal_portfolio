<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ShopMERN — E-Commerce Prototype</title>
<style>
  :root{
    --bg:#faf6f0;--card:#ffffff;--soft:#f3ece1;--line:#e8dece;
    --text:#2c2620;--muted:#948979;--brand:#0f9d76;--brand2:#0c7d5e;
    --good:#0f9d76;--warn:#d98a26;--bad:#d1493f;--radius:18px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:
    radial-gradient(1200px 600px at 80% -10%,rgba(15,157,118,.10),transparent),
    radial-gradient(1000px 500px at -10% 10%,rgba(217,138,38,.09),transparent),var(--bg);
    color:var(--text);min-height:100vh}
  a{color:inherit}
  header{position:sticky;top:0;z-index:40;backdrop-filter:blur(12px);
    background:rgba(250,246,240,.8);border-bottom:1px solid var(--line)}
  .bar{max-width:1200px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:16px}
  .logo{font-family:Georgia,'Times New Roman',serif;font-weight:800;font-size:21px;letter-spacing:.2px;display:flex;align-items:center;gap:8px}
  .logo b{background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .search{flex:1;max-width:440px;position:relative}
  .search input{width:100%;background:var(--soft);border:1px solid var(--line);color:var(--text);
    padding:11px 14px 11px 40px;border-radius:12px;font-size:14px;outline:none}
  .search input:focus{border-color:var(--brand)}
  .search svg{position:absolute;left:12px;top:11px;opacity:.6}
  .cartbtn{margin-left:auto;position:relative;background:var(--soft);border:1px solid var(--line);
    color:var(--text);padding:10px 16px;border-radius:12px;cursor:pointer;font-weight:600;display:flex;gap:8px;align-items:center}
  .cartbtn:hover{border-color:var(--brand)}
  .badge{position:absolute;top:-8px;right:-8px;background:var(--brand);color:#fff;font-size:11px;
    min-width:20px;height:20px;border-radius:20px;display:grid;place-items:center;padding:0 5px;font-weight:700}
  .hero{max-width:1200px;margin:26px auto 6px;padding:0 20px}
  .hero .panel{background:linear-gradient(120deg,rgba(15,157,118,.14),rgba(217,138,38,.10));
    border:1px solid var(--line);border-radius:22px;padding:30px 28px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:18px;align-items:center}
  .hero h1{font-family:Georgia,'Times New Roman',serif;font-size:32px;line-height:1.12;max-width:520px}
  .hero p{color:var(--muted);margin-top:10px;max-width:520px}
  .pill{display:inline-flex;gap:6px;align-items:center;background:rgba(34,197,94,.12);color:var(--good);
    border:1px solid rgba(34,197,94,.3);padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600}
  .live-dot{width:8px;height:8px;background:var(--good);border-radius:50%;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  main{max-width:1200px;margin:0 auto;padding:20px}
  .filters{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0 20px}
  .chip{background:var(--soft);border:1px solid var(--line);color:var(--muted);padding:9px 16px;
    border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s}
  .chip:hover{color:var(--text)}
  .chip.active{background:linear-gradient(90deg,var(--brand),var(--brand2));color:#fff;border-color:transparent}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;
    transition:.2s;display:flex;flex-direction:column}
  .card:hover{transform:translateY(-4px);border-color:var(--brand);box-shadow:0 18px 40px -20px rgba(15,157,118,.35)}
  .thumb{height:150px;display:grid;place-items:center;font-size:52px;position:relative}
  .stockTag{position:absolute;top:10px;left:10px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px}
  .rating{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.4);font-size:11px;padding:4px 8px;border-radius:20px;font-weight:600}
  .body{padding:14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .cat{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
  .name{font-family:Georgia,'Times New Roman',serif;font-weight:700;font-size:16px}
  .price{font-size:20px;font-weight:800}
  .price s{font-size:13px;color:var(--muted);font-weight:500;margin-left:6px}
  .stockbar{height:5px;background:var(--soft);border-radius:5px;overflow:hidden}
  .stockbar i{display:block;height:100%;border-radius:5px;transition:.4s}
  .add{margin-top:auto;background:linear-gradient(90deg,var(--brand),var(--brand2));border:none;color:#fff;
    padding:11px;border-radius:11px;font-weight:700;cursor:pointer;font-size:14px}
  .add:hover{opacity:.9}
  .add:disabled{background:var(--soft);color:var(--muted);cursor:not-allowed}
  /* Cart drawer */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s;z-index:50}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;height:100%;width:390px;max-width:92vw;background:var(--bg);
    border-left:1px solid var(--line);z-index:60;transform:translateX(100%);transition:.28s;display:flex;flex-direction:column}
  .drawer.open{transform:none}
  .dhead{padding:20px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
  .dhead h3{font-size:18px}
  .x{background:var(--soft);border:1px solid var(--line);color:var(--text);width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:18px}
  .items{flex:1;overflow:auto;padding:14px 20px;display:flex;flex-direction:column;gap:12px}
  .li{display:flex;gap:12px;align-items:center;background:var(--card);border:1px solid var(--line);padding:10px;border-radius:12px}
  .li .ic{font-size:30px}
  .li .info{flex:1}
  .li .nm{font-weight:600;font-size:14px}
  .li .pr{color:var(--muted);font-size:13px}
  .qty{display:flex;align-items:center;gap:8px}
  .qty button{width:26px;height:26px;border-radius:8px;border:1px solid var(--line);background:var(--soft);color:var(--text);cursor:pointer;font-weight:700}
  .empty{text-align:center;color:var(--muted);margin-top:60px;font-size:14px}
  .foot{padding:20px;border-top:1px solid var(--line)}
  .row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px;color:var(--muted)}
  .row.total{color:var(--text);font-size:20px;font-weight:800;margin:12px 0}
  .checkout{width:100%;background:linear-gradient(90deg,var(--brand),var(--brand2));border:none;color:#fff;padding:14px;border-radius:12px;font-weight:800;cursor:pointer;font-size:15px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--card);
    border:1px solid var(--good);color:var(--text);padding:13px 20px;border-radius:12px;font-weight:600;z-index:80;transition:.3s;box-shadow:0 12px 30px rgba(0,0,0,.4)}
  .toast.show{transform:translateX(-50%) translateY(0)}
  .back{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:13px;margin-bottom:4px}
  .back:hover{color:var(--text)}
  @media(max-width:640px){.hero h1{font-size:24px}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">🛍️ <span>Shop<b>MERN</b></span></div>
    <div class="search">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="q" placeholder="Search products..." />
    </div>
    <button class="cartbtn" onclick="openCart()">🛒 Cart <span class="badge" id="badge">0</span></button>
  </div>
</header>

<div class="hero">
  <a class="back" href="/#projects">← Back to portfolio</a>
  <div class="panel">
    <div>
      <span class="pill"><span class="live-dot"></span> Live inventory syncing</span>
      <h1>Full-stack shopping, real-time stock.</h1>
      <p>A MERN-style storefront prototype — browse, filter, add to cart and check out. Stock counts update live as items sell across the store.</p>
    </div>
    <div style="font-size:90px">🛒</div>
  </div>
</div>

<main>
  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- Cart -->
<div class="overlay" id="overlay" onclick="closeCart()"></div>
<aside class="drawer" id="drawer">
  <div class="dhead"><h3>Your Cart</h3><button class="x" onclick="closeCart()">×</button></div>
  <div class="items" id="items"></div>
  <div class="foot" id="foot"></div>
</aside>

<div class="toast" id="toast"></div>

<script>
const CATS = ['All','Electronics','Fashion','Home','Fitness'];
const PRODUCTS = [
  {id:1,name:'Aurora Wireless Headphones',cat:'Electronics',price:129,old:179,icon:'🎧',stock:14,rating:4.8,c:'#4f7cff'},
  {id:2,name:'Nova Smart Watch',cat:'Electronics',price:199,old:249,icon:'⌚',stock:8,rating:4.7,c:'#7b5cff'},
  {id:3,name:'Mecha RGB Keyboard',cat:'Electronics',price:89,old:0,icon:'⌨️',stock:23,rating:4.6,c:'#22c55e'},
  {id:4,name:'Urban Runner Sneakers',cat:'Fashion',price:74,old:99,icon:'👟',stock:5,rating:4.9,c:'#f59e0b'},
  {id:5,name:'Heritage Leather Jacket',cat:'Fashion',price:159,old:0,icon:'🧥',stock:11,rating:4.5,c:'#ef4444'},
  {id:6,name:'Classic Aviator Shades',cat:'Fashion',price:45,old:60,icon:'🕶️',stock:0,rating:4.4,c:'#06b6d4'},
  {id:7,name:'Ceramic Pour-Over Set',cat:'Home',price:38,old:0,icon:'☕',stock:19,rating:4.7,c:'#a855f7'},
  {id:8,name:'Ambient Glow Lamp',cat:'Home',price:52,old:69,icon:'💡',stock:7,rating:4.6,c:'#eab308'},
  {id:9,name:'Botanic Scented Candle',cat:'Home',price:24,old:0,icon:'🕯️',stock:31,rating:4.3,c:'#ec4899'},
  {id:10,name:'FlexPro Dumbbell Set',cat:'Fitness',price:119,old:149,icon:'🏋️',stock:6,rating:4.8,c:'#14b8a6'},
  {id:11,name:'ZenGrip Yoga Mat',cat:'Fitness',price:34,old:0,icon:'🧘',stock:16,rating:4.5,c:'#f97316'},
  {id:12,name:'Hydro Steel Bottle',cat:'Fitness',price:28,old:39,icon:'🧴',stock:22,rating:4.6,c:'#3b82f6'},
];
let cat='All', query='', cart={};

function stockColor(s){return s===0?'var(--bad)':s<=6?'var(--warn)':'var(--good)'}
function stockLabel(s){return s===0?'Sold out':s<=6?'Low · '+s+' left':'In stock'}

function renderFilters(){
  document.getElementById('filters').innerHTML = CATS.map(c=>
    `<div class="chip ${c===cat?'active':''}" onclick="setCat('${c}')">${c}</div>`).join('');
}
function setCat(c){cat=c;renderFilters();renderGrid()}

function renderGrid(){
  const list = PRODUCTS.filter(p=>(cat==='All'||p.cat===cat)&&p.name.toLowerCase().includes(query));
  const g=document.getElementById('grid');
  if(!list.length){g.innerHTML=`<p class="empty" style="grid-column:1/-1">No products match your search.</p>`;return}
  g.innerHTML=list.map(p=>{
    const pct=Math.min(100,(p.stock/35)*100);
    return `<div class="card">
      <div class="thumb" style="background:radial-gradient(circle at 50% 40%, ${p.c}33, transparent)">
        <div class="stockTag" style="background:${stockColor(p.stock)}22;color:${stockColor(p.stock)};border:1px solid ${stockColor(p.stock)}55">${stockLabel(p.stock)}</div>
        <div class="rating">⭐ ${p.rating}</div>
        <span style="filter:drop-shadow(0 8px 14px rgba(0,0,0,.4))">${p.icon}</span>
      </div>
      <div class="body">
        <div class="cat">${p.cat}</div>
        <div class="name">${p.name}</div>
        <div class="price">$${p.price}${p.old?`<s>$${p.old}</s>`:''}</div>
        <div class="stockbar"><i style="width:${pct}%;background:${stockColor(p.stock)}"></i></div>
        <button class="add" ${p.stock===0?'disabled':''} onclick="addToCart(${p.id})">
          ${p.stock===0?'Sold Out':'Add to Cart'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function addToCart(id){
  const p=PRODUCTS.find(x=>x.id===id);
  if(p.stock<=0)return;
  p.stock--;
  cart[id]=(cart[id]||0)+1;
  save();renderGrid();renderCart();updateBadge();
  toast(`Added ${p.name.split(' ').slice(0,2).join(' ')} to cart`);
}
function changeQty(id,d){
  const p=PRODUCTS.find(x=>x.id===id);
  if(d>0){if(p.stock<=0){toast('No more stock available');return}p.stock--;cart[id]++}
  else{cart[id]--;p.stock++;if(cart[id]<=0)delete cart[id]}
  save();renderGrid();renderCart();updateBadge();
}
function updateBadge(){
  const n=Object.values(cart).reduce((a,b)=>a+b,0);
  document.getElementById('badge').textContent=n;
}
function cartTotal(){return Object.entries(cart).reduce((s,[id,q])=>s+PRODUCTS.find(p=>p.id==id).price*q,0)}

function renderCart(){
  const items=document.getElementById('items'), foot=document.getElementById('foot');
  const entries=Object.entries(cart);
  if(!entries.length){
    items.innerHTML=`<div class="empty">🛒<br><br>Your cart is empty.<br>Add something you love.</div>`;
    foot.innerHTML='';return;
  }
  items.innerHTML=entries.map(([id,q])=>{
    const p=PRODUCTS.find(x=>x.id==id);
    return `<div class="li"><div class="ic">${p.icon}</div>
      <div class="info"><div class="nm">${p.name}</div><div class="pr">$${p.price} each</div></div>
      <div class="qty"><button onclick="changeQty(${id},-1)">−</button><b>${q}</b><button onclick="changeQty(${id},1)">+</button></div>
    </div>`;
  }).join('');
  const sub=cartTotal(), ship=sub>150||sub===0?0:9.99, tax=+(sub*0.075).toFixed(2);
  foot.innerHTML=`
    <div class="row"><span>Subtotal</span><span>$${sub.toFixed(2)}</span></div>
    <div class="row"><span>Shipping ${sub>150?'(free over $150)':''}</span><span>$${ship.toFixed(2)}</span></div>
    <div class="row"><span>Tax (7.5%)</span><span>$${tax.toFixed(2)}</span></div>
    <div class="row total"><span>Total</span><span>$${(sub+ship+tax).toFixed(2)}</span></div>
    <button class="checkout" onclick="checkout()">Checkout · $${(sub+ship+tax).toFixed(2)}</button>`;
}
function checkout(){
  const n=Object.values(cart).reduce((a,b)=>a+b,0);
  if(!n)return;
  toast(`✅ Order placed! ${n} item${n>1?'s':''} · $${cartTotal().toFixed(2)}`);
  cart={};save();renderCart();updateBadge();renderGrid();
  setTimeout(closeCart,900);
}
function openCart(){document.getElementById('drawer').classList.add('open');document.getElementById('overlay').classList.add('open')}
function closeCart(){document.getElementById('drawer').classList.remove('open');document.getElementById('overlay').classList.remove('open')}

let toastTimer;
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200);
}
function save(){localStorage.setItem('shopmern_cart',JSON.stringify(cart))}
function load(){try{cart=JSON.parse(localStorage.getItem('shopmern_cart'))||{}}catch(e){cart={}}}

// Simulate other shoppers buying stock live
setInterval(()=>{
  const inStock=PRODUCTS.filter(p=>p.stock>0);
  if(!inStock.length)return;
  const p=inStock[Math.floor(Math.random()*inStock.length)];
  if(p.stock>0){p.stock--;renderGrid();}
},4500);

document.getElementById('q').addEventListener('input',e=>{query=e.target.value.toLowerCase();renderGrid()});
load();renderFilters();renderGrid();renderCart();updateBadge();
</script>
</body>
</html>
