<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BRTickets — Bus Booking Prototype</title>
<style>
  :root{
    --bg:#0b1220;--panel:#111a2b;--soft:#182338;--line:#243450;
    --text:#eaf0fb;--muted:#8ba0c0;--brand:#f97316;--brand2:#fb923c;--accent:#10b981;
    --seat:#243450;--sel:#f97316;--taken:#334155;--radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:
    radial-gradient(1000px 500px at 100% -10%,rgba(249,115,22,.14),transparent),
    radial-gradient(700px 400px at 0% 10%,rgba(16,185,129,.08),transparent),var(--bg);
    color:var(--text);min-height:100vh}
  header{border-bottom:1px solid var(--line);background:rgba(11,18,32,.82);backdrop-filter:blur(10px);position:sticky;top:0;z-index:20}
  .bar{max-width:1080px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:14px}
  .logo{font-weight:800;font-size:20px;display:flex;align-items:center;gap:8px}
  .logo b{background:linear-gradient(90deg,var(--brand),var(--brand2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .back{color:var(--muted);text-decoration:none;font-size:13px;margin-left:auto}.back:hover{color:var(--text)}
  .wrap{max-width:1080px;margin:0 auto;padding:22px 20px 40px}
  /* steps */
  .steps{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .step{flex:1;min-width:120px;display:flex;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);padding:12px 14px;border-radius:12px;font-size:13px;color:var(--muted)}
  .step.on{border-color:var(--brand);color:var(--text)}
  .step.done{border-color:var(--accent)}
  .sn{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:12px;background:var(--soft);flex-shrink:0}
  .step.on .sn{background:var(--brand);color:#111}
  .step.done .sn{background:var(--accent);color:#062}
  /* search */
  .search{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:22px}
  .srow{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:14px;align-items:end}
  label{display:block;font-size:12px;color:var(--muted);font-weight:700;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
  select,input{width:100%;background:var(--soft);border:1px solid var(--line);color:var(--text);padding:12px 13px;border-radius:11px;font-size:14px;outline:none;font-family:inherit}
  select:focus,input:focus{border-color:var(--brand)}
  .btn{background:linear-gradient(90deg,var(--brand),var(--brand2));border:none;color:#111;padding:13px 22px;border-radius:12px;font-weight:800;cursor:pointer;font-size:15px;white-space:nowrap}
  .btn:hover{opacity:.92}
  .btn.ghost{background:var(--soft);color:var(--text);border:1px solid var(--line)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  h2.sec{font-size:18px;margin:26px 0 14px}
  /* trips */
  .trip{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;transition:.15s}
  .trip:hover{border-color:var(--brand)}
  .op{display:flex;flex-direction:column;align-items:center;gap:6px;width:80px}
  .oplogo{width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-size:22px}
  .opn{font-size:11px;color:var(--muted);text-align:center;font-weight:700}
  .route{display:flex;align-items:center;gap:14px}
  .time{text-align:center}.time .t{font-size:20px;font-weight:800}.time .c{font-size:12px;color:var(--muted)}
  .dur{text-align:center;color:var(--muted);font-size:12px;flex:1;min-width:90px}
  .durline{height:2px;background:var(--line);position:relative;margin:6px 0}
  .durline::after{content:'🚌';position:absolute;right:-4px;top:-11px;font-size:14px}
  .tright{text-align:right}
  .price{font-size:24px;font-weight:800}.price small{font-size:12px;color:var(--muted);font-weight:600}
  .seatsleft{font-size:11px;color:var(--accent);font-weight:700;margin:4px 0 8px}
  .amen{display:flex;gap:6px;margin-top:6px;justify-content:center;flex-wrap:wrap}
  .amen span{font-size:11px;background:var(--soft);border:1px solid var(--line);padding:2px 8px;border-radius:12px;color:var(--muted)}
  /* seat map */
  .seatlayout{display:grid;grid-template-columns:1fr 320px;gap:20px}
  .bus{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
  .busbody{max-width:300px;margin:0 auto;background:var(--soft);border:1px solid var(--line);border-radius:18px 18px 40px 40px;padding:18px}
  .driver{display:flex;justify-content:flex-end;margin-bottom:14px;padding-bottom:14px;border-bottom:1px dashed var(--line)}
  .driver span{font-size:22px}
  .seatgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  .seat{aspect-ratio:1;background:var(--seat);border:1px solid var(--line);border-radius:8px;display:grid;place-items:center;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);transition:.12s}
  .seat:hover:not(.taken){border-color:var(--brand);color:var(--text)}
  .seat.aisle{background:none;border:none;cursor:default}
  .seat.taken{background:var(--taken);color:#54637d;cursor:not-allowed}
  .seat.sel{background:var(--sel);color:#111;border-color:var(--sel)}
  .legend{display:flex;gap:16px;justify-content:center;margin-top:16px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .legend span{display:inline-flex;gap:6px;align-items:center}
  .lb{width:14px;height:14px;border-radius:4px;border:1px solid var(--line)}
  /* summary */
  .summary{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:20px;align-self:start;position:sticky;top:80px}
  .summary h3{margin-bottom:14px}
  .sr{display:flex;justify-content:space-between;font-size:14px;margin-bottom:10px;color:var(--muted)}
  .sr b{color:var(--text)}
  .selseats{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0 14px}
  .selseats span{background:var(--sel);color:#111;font-weight:800;font-size:12px;padding:4px 9px;border-radius:8px}
  .divider{height:1px;background:var(--line);margin:14px 0}
  .total{display:flex;justify-content:space-between;font-size:22px;font-weight:800;margin:8px 0 16px}
  /* ticket */
  .ticket{max-width:440px;margin:20px auto;background:var(--panel);border:1px solid var(--line);border-radius:20px;overflow:hidden}
  .tkhead{background:linear-gradient(120deg,var(--brand),var(--brand2));color:#111;padding:22px;text-align:center}
  .tkhead .big{font-size:24px;font-weight:900}
  .tkbody{padding:22px}
  .tkrow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px dashed var(--line);font-size:14px}
  .tkrow:last-child{border:none}
  .tkrow .k{color:var(--muted)}.tkrow .v{font-weight:700}
  .qr{width:110px;height:110px;margin:16px auto 0;background:#fff;border-radius:12px;display:grid;place-items:center}
  .hidden{display:none}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(120px);background:var(--panel);border:1px solid var(--brand);padding:13px 20px;border-radius:12px;font-weight:600;z-index:80;transition:.3s;font-size:14px}
  .toast.show{transform:translateX(-50%) translateY(0)}
  @media(max-width:820px){.seatlayout{grid-template-columns:1fr}.srow{grid-template-columns:1fr 1fr}.trip{grid-template-columns:1fr;text-align:center}.route{justify-content:center}}
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="logo">🚌 <span>BR<b>Tickets</b></span></div>
    <a class="back" href="/#projects">← Portfolio</a>
  </div>
</header>

<div class="wrap">
  <div class="steps" id="steps"></div>

  <!-- STEP 1: SEARCH -->
  <div id="s1">
    <div class="search">
      <div class="srow">
        <div><label>From</label><select id="from"><option>Lagos</option><option>Abuja</option><option>Port Harcourt</option><option>Ibadan</option><option>Enugu</option></select></div>
        <div><label>To</label><select id="to"><option>Abuja</option><option>Lagos</option><option>Enugu</option><option>Kano</option><option>Benin City</option></select></div>
        <div><label>Travel Date</label><input type="date" id="date" /></div>
        <div><button class="btn" onclick="goTrips()">Search Buses</button></div>
      </div>
    </div>
    <h2 class="sec">Popular routes</h2>
    <div id="popular" style="display:flex;gap:12px;flex-wrap:wrap"></div>
  </div>

  <!-- STEP 2: TRIPS -->
  <div id="s2" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <h2 class="sec" id="tripsHead" style="margin:0"></h2>
      <button class="btn ghost" onclick="step(1)">← Change search</button>
    </div>
    <div id="trips" style="margin-top:14px"></div>
  </div>

  <!-- STEP 3: SEATS -->
  <div id="s3" class="hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px">
      <h2 class="sec" style="margin:0">Choose your seats</h2>
      <button class="btn ghost" onclick="step(2)">← Back to buses</button>
    </div>
    <div class="seatlayout" style="margin-top:14px">
      <div class="bus">
        <div class="busbody">
          <div class="driver"><span>🧑🏾‍✈️</span></div>
          <div class="seatgrid" id="seatgrid"></div>
        </div>
        <div class="legend">
          <span><span class="lb" style="background:var(--seat)"></span>Available</span>
          <span><span class="lb" style="background:var(--sel)"></span>Selected</span>
          <span><span class="lb" style="background:var(--taken)"></span>Taken</span>
        </div>
      </div>
      <div class="summary">
        <h3>Trip summary</h3>
        <div id="tripSummary"></div>
        <div class="divider"></div>
        <div class="sr"><span>Selected seats</span></div>
        <div class="selseats" id="selSeats"><span style="background:var(--soft);color:var(--muted)">None yet</span></div>
        <div class="sr"><span>Seats × <b id="seatCount">0</b></span><b id="seatSub">₦0</b></div>
        <div class="sr"><span>Service fee</span><b>₦500</b></div>
        <div class="total"><span>Total</span><span id="grandTotal">₦0</span></div>
        <button class="btn" style="width:100%" id="payBtn" onclick="pay()" disabled>Confirm &amp; Pay</button>
      </div>
    </div>
  </div>

  <!-- STEP 4: TICKET -->
  <div id="s4" class="hidden">
    <div class="ticket">
      <div class="tkhead"><div>✅ Booking Confirmed</div><div class="big" id="tkRoute"></div></div>
      <div class="tkbody" id="tkBody"></div>
    </div>
    <div style="text-align:center;margin-top:18px"><button class="btn ghost" onclick="reset()">Book another trip</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const OPERATORS=[
  {name:'GIGM',emoji:'🚍',color:'#f97316'},
  {name:'ABC Transport',emoji:'🚌',color:'#3b82f6'},
  {name:'God is Good',emoji:'🚐',color:'#10b981'},
  {name:'Chisco',emoji:'🚎',color:'#a855f7'},
];
const AMEN=['❄️ AC','📶 WiFi','🔌 USB','🎬 TV'];
let search={}, selectedTrip=null, selectedSeats=[], takenSeats=[];
const PRICE_BASE=8500;

function todayStr(){return '2026-08-15'}
document.getElementById('date').value=todayStr();

const POPULAR=[['Lagos','Abuja','₦12,500'],['Abuja','Enugu','₦9,000'],['Lagos','Ibadan','₦4,500'],['PH','Lagos','₦14,000']];
document.getElementById('popular').innerHTML=POPULAR.map(r=>`
  <div style="background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 18px;cursor:pointer;flex:1;min-width:150px" onclick="quickRoute('${r[0]}','${r[1]}')">
    <div style="font-weight:700">${r[0]} → ${r[1]}</div>
    <div style="color:var(--muted);font-size:13px;margin-top:4px">from ${r[2]}</div>
  </div>`).join('');
function quickRoute(f,t){
  const fs=document.getElementById('from'),ts=document.getElementById('to');
  [...fs.options].forEach(o=>{if(o.value===f||f==='PH'&&o.value==='Port Harcourt')fs.value=o.value});
  [...ts.options].forEach(o=>{if(o.value===t)ts.value=o.value});
  goTrips();
}

function renderSteps(n){
  const labels=['Search','Select Bus','Pick Seats','Confirm'];
  document.getElementById('steps').innerHTML=labels.map((l,i)=>{
    const s=i+1;const cls=s===n?'on':s<n?'done':'';
    return `<div class="step ${cls}"><span class="sn">${s<n?'✓':s}</span>${l}</div>`;
  }).join('');
}
function step(n){
  [1,2,3,4].forEach(i=>document.getElementById('s'+i).classList.toggle('hidden',i!==n));
  renderSteps(n);window.scrollTo({top:0,behavior:'smooth'});
}

function goTrips(){
  search={from:document.getElementById('from').value,to:document.getElementById('to').value,date:document.getElementById('date').value};
  if(search.from===search.to){toast('Origin and destination must differ');return}
  document.getElementById('tripsHead').textContent=`${search.from} → ${search.to} · ${search.date}`;
  const times=[['06:00','12:30'],['08:30','15:00'],['11:00','17:30'],['14:00','20:15'],['16:30','23:00']];
  document.getElementById('trips').innerHTML=times.map((tm,i)=>{
    const op=OPERATORS[i%OPERATORS.length];
    const price=PRICE_BASE+i*750+(search.to==='Abuja'?4000:0);
    const seatsLeft=[4,9,2,14,7][i];
    const dur=(parseInt(tm[1])-parseInt(tm[0]))+'h '+((tm[1].slice(3)-tm[0].slice(3)+60)%60)+'m';
    return `<div class="trip">
      <div class="op"><div class="oplogo" style="background:${op.color}22;color:${op.color}">${op.emoji}</div><div class="opn">${op.name}</div></div>
      <div class="route">
        <div class="time"><div class="t">${tm[0]}</div><div class="c">${search.from}</div></div>
        <div class="dur">${dur}<div class="durline"></div>Direct</div>
        <div class="time"><div class="t">${tm[1]}</div><div class="c">${search.to}</div></div>
        <div class="amen">${AMEN.slice(0,3+(i%2)).map(a=>`<span>${a}</span>`).join('')}</div>
      </div>
      <div class="tright">
        <div class="price">₦${price.toLocaleString()}<small>/seat</small></div>
        <div class="seatsleft">${seatsLeft} seats left</div>
        <button class="btn" onclick='selectTrip(${JSON.stringify({op:op.name,emoji:op.emoji,color:op.color,dep:tm[0],arr:tm[1],price,dur})})'>Select seats</button>
      </div>
    </div>`;
  }).join('');
  step(2);
}

function selectTrip(t){
  selectedTrip=t;selectedSeats=[];
  // deterministic taken seats
  takenSeats=[];
  for(let i=1;i<=32;i++){if(Math.abs(Math.sin(i*t.price))>0.62)takenSeats.push(i)}
  renderSeatMap();renderSummary();step(3);
}

function renderSeatMap(){
  // 32 seats, layout 2 + aisle + 2 per row => 8 rows, 5 cols (col 3 = aisle)
  let html='';let seat=1;
  for(let r=0;r<8;r++){
    for(let c=0;c<5;c++){
      if(c===2){html+='<div class="seat aisle"></div>';continue}
      const n=seat++;
      const cls=selectedSeats.includes(n)?'sel':takenSeats.includes(n)?'taken':'';
      html+=`<div class="seat ${cls}" onclick="toggleSeat(${n})">${n}</div>`;
    }
  }
  document.getElementById('seatgrid').innerHTML=html;
}
function toggleSeat(n){
  if(takenSeats.includes(n))return;
  if(selectedSeats.includes(n))selectedSeats=selectedSeats.filter(s=>s!==n);
  else{if(selectedSeats.length>=4){toast('Max 4 seats per booking');return}selectedSeats.push(n)}
  renderSeatMap();renderSummary();
}
function renderSummary(){
  const t=selectedTrip;
  document.getElementById('tripSummary').innerHTML=`
    <div class="sr"><span>Operator</span><b>${t.emoji} ${t.op}</b></div>
    <div class="sr"><span>Route</span><b>${search.from} → ${search.to}</b></div>
    <div class="sr"><span>Departs</span><b>${t.dep} · ${search.date.slice(5)}</b></div>`;
  const sub=selectedSeats.length*t.price;
  document.getElementById('selSeats').innerHTML=selectedSeats.length?selectedSeats.sort((a,b)=>a-b).map(s=>`<span>${s}</span>`).join(''):'<span style="background:var(--soft);color:var(--muted)">None yet</span>';
  document.getElementById('seatCount').textContent=selectedSeats.length;
  document.getElementById('seatSub').textContent='₦'+sub.toLocaleString();
  document.getElementById('grandTotal').textContent='₦'+(sub+(selectedSeats.length?500:0)).toLocaleString();
  document.getElementById('payBtn').disabled=selectedSeats.length===0;
}

function pay(){
  if(!selectedSeats.length)return;
  const t=selectedTrip;const sub=selectedSeats.length*t.price+500;
  const ref='BR'+Math.abs(Math.floor(Math.sin(t.price*selectedSeats[0])*1e6)).toString().padStart(6,'0');
  document.getElementById('tkRoute').textContent=`${search.from} → ${search.to}`;
  document.getElementById('tkBody').innerHTML=`
    <div class="tkrow"><span class="k">Operator</span><span class="v">${t.emoji} ${t.op}</span></div>
    <div class="tkrow"><span class="k">Date &amp; time</span><span class="v">${search.date} · ${t.dep}</span></div>
    <div class="tkrow"><span class="k">Seats</span><span class="v">${selectedSeats.sort((a,b)=>a-b).join(', ')}</span></div>
    <div class="tkrow"><span class="k">Passengers</span><span class="v">${selectedSeats.length}</span></div>
    <div class="tkrow"><span class="k">Booking ref</span><span class="v" style="font-family:monospace">${ref}</span></div>
    <div class="tkrow"><span class="k">Total paid</span><span class="v" style="color:var(--brand);font-size:16px">₦${sub.toLocaleString()}</span></div>
    <div class="qr">${qrSVG(ref)}</div>
    <div style="text-align:center;color:var(--muted);font-size:12px;margin-top:8px">Show this QR at the terminal gate</div>`;
  step(4);toast('Payment successful · ticket issued 🎟️');
}
function qrSVG(seed){
  let cells='';const n=11;
  for(let y=0;y<n;y++)for(let x=0;x<n;x++){
    const on=Math.abs(Math.sin((x+1)*(y+3)*seed.length*7))>0.5;
    const corner=(x<3&&y<3)||(x>n-4&&y<3)||(x<3&&y>n-4);
    if(on||corner)cells+=`<rect x="${x*9}" y="${y*9}" width="9" height="9" fill="#111"/>`;
  }
  return `<svg width="99" height="99" viewBox="0 0 99 99">${cells}</svg>`;
}

function reset(){selectedSeats=[];selectedTrip=null;step(1)}
let toastTimer;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2400)}

renderSteps(1);
</script>
</body>
</html>
